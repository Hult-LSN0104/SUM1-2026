<!DOCTYPE html>
<html>
  <head>
    <title>Weather App — Powered with Tailwind CSS</title>
    <!-- Tailwind via CDN (easiest for learning) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <!-- Hero section -->
    <div class="bg-blue-600 text-white py-12">
      <div class="max-w-4xl mx-auto px-4">
        <h1 class="text-4xl font-bold">Weather App</h1>
        <p class="text-lg mt-2">Check the weather anywhere</p>
      </div>
    </div>

    <!-- Form section -->
    <div class="max-w-4xl mx-auto px-4 py-8">
      <form method="post" class="bg-white p-6 rounded-lg shadow">
        <div class="mb-4">
          <input 
            type="text" 
            name="city" 
            placeholder="Enter city name"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        <button 
          type="submit"
          class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-semibold"
        >
          Get Weather
        </button>
      </form>

      <!-- Weather result -->
      {% if weather %}
      <div class="bg-green-50 border-2 border-green-400 text-green-800 px-6 py-4 rounded-lg mt-6">
        <h3 class="text-2xl font-bold">{{ weather["city"] }}</h3> 
        <h4 class="text-xl text-gray-600">{{ weather["country"] }}</h4>
        <p class="text-lg mt-2">
          <span class="text-3xl font-bold">{{ weather["temp"] }}°F</span>
          <span class="ml-4">{{ weather["description"] }}</span>
        </p>
      </div>
      {% else %}
      <p class="text-gray-600 mt-6 text-center">Enter a city above to get started.</p>
      {% endif %}
    </div>
  </body>
</html>
